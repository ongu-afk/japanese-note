<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="일본어 노트">
<meta name="theme-color" content="#111113">
<title>🇯🇵 나의 일본어 노트</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #111113; font-family: "Apple SD Gothic Neo", "Pretendard", sans-serif; color: #fff; max-width: 500px; margin: 0 auto; padding-bottom: 100px; min-height: 100vh; }
  input { font-family: inherit; }
  button { font-family: inherit; }
  .header { padding: 0 20px; }
  .header-hero { margin: 0 -20px; padding: 48px 20px 18px; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border-radius: 0 0 24px 24px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-flag { font-size: 28px; }
  .header-title { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
  .header-count { color: #52525b; font-size: 12px; margin-top: 2px; }
  .header-hero .header-count { color: rgba(255,255,255,0.72); }
  .auth-btn { background: rgba(17,17,19,0.24); border: 1px solid rgba(255,255,255,0.28); border-radius: 10px; padding: 7px 11px; color: #fff; font-size: 12px; font-weight: 800; cursor: pointer; white-space: nowrap; }
  body.auth-locked .header, body.auth-locked .cards, body.auth-locked .fab { display: none; }
  .login-gate { position: fixed; inset: 0; background: #111113; display: none; align-items: center; justify-content: center; padding: 24px; z-index: 200; }
  body.auth-locked .login-gate { display: flex; }
  .login-card { width: 100%; max-width: 360px; background: #18181b; border: 1px solid #2d2d30; border-radius: 24px; padding: 28px 22px; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
  .login-icon { font-size: 46px; margin-bottom: 14px; }
  .login-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
  .login-sub { color: #a1a1aa; font-size: 14px; line-height: 1.5; margin-bottom: 22px; }
  .login-btn { width: 100%; background: #fff; border: none; border-radius: 14px; padding: 13px 16px; color: #18181b; font-size: 15px; font-weight: 800; cursor: pointer; }
  .search-wrap { position: relative; margin: 18px 0 14px; }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #52525b; font-size: 15px; pointer-events: none; }
  .search-input { width: 100%; background: #1c1c1f; border: 1.5px solid #2d2d30; border-radius: 12px; padding: 11px 36px 11px 38px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: #4f46e5; }
  .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #71717a; cursor: pointer; font-size: 18px; padding: 0; display: none; }
  .tags-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; -ms-overflow-style: none; }
  .tags-row::-webkit-scrollbar { display: none; }
  .pill { border-radius: 99px; padding: 3px 11px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1.5px solid; transition: all 0.15s; white-space: nowrap; line-height: 1.5; }
  .cards { padding: 4px 16px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: #1c1c1f; border-radius: 16px; padding: 18px 16px; border: 1px solid #2d2d30; cursor: pointer; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-jp { font-size: 21px; font-weight: 700; color: #fff; margin-bottom: 3px; font-family: "Noto Sans JP", sans-serif; line-height: 1.3; }
  .card-reading { font-size: 12px; color: #71717a; margin-bottom: 6px; font-family: "Noto Sans JP", sans-serif; }
  .card-kr { font-size: 14px; color: #d4d4d8; }
  .card-arrow { color: #52525b; font-size: 16px; flex-shrink: 0; margin-top: 4px; }
  .card-detail { margin-top: 14px; border-top: 1px solid #27272a; padding-top: 14px; display: none; }
  .card-source { font-size: 12px; color: #71717a; margin-bottom: 8px; }
  .card-source span { color: #a1a1aa; }
  .card-note { font-size: 13px; color: #a1a1aa; background: #27272a; border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .card-actions { display: flex; gap: 8px; }
  .card-btn { flex: 1; background: #27272a; border: none; border-radius: 10px; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-edit { color: #a1a1aa; }
  .btn-del { color: #ef4444; }
  .empty { text-align: center; padding: 60px 0; color: #52525b; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 600; }
  .empty-sub { font-size: 13px; margin-top: 6px; }
  .fab { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none; border-radius: 99px; padding: 14px 28px; color: #fff; font-weight: 700; font-size: 16px; box-shadow: 0 8px 32px rgba(79,70,229,0.45); cursor: pointer; display: flex; align-items: center; gap: 8px; z-index: 50; white-space: nowrap; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: flex-end; justify-content: center; z-index: 100; backdrop-filter: blur(2px); display: none; }
  .modal { background: #18181b; border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; box-shadow: 0 -8px 40px rgba(0,0,0,0.5); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-weight: 700; font-size: 17px; }
  .modal-close { background: none; border: none; color: #71717a; font-size: 24px; cursor: pointer; padding: 0; line-height: 1; }
  .field { margin-bottom: 14px; }
  .field label { color: #a1a1aa; font-size: 12px; font-weight: 600; display: block; margin-bottom: 5px; }
  .field input { width: 100%; background: #27272a; border: 1.5px solid #3f3f46; border-radius: 10px; padding: 10px 12px; color: #fff; font-size: 14px; outline: none; }
  .field input.jp { font-size: 18px; font-family: "Noto Sans JP", sans-serif; }
  .field input::placeholder { color: #52525b; }
  .tag-section { margin-bottom: 18px; }
  .tag-section label { color: #a1a1aa; font-size: 12px; font-weight: 600; display: block; margin-bottom: 8px; }
  .existing-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 10px; }
  .tag-input-row { display: flex; gap: 8px; }
  .tag-input-row input { flex: 1; background: #27272a; border: 1.5px solid #3f3f46; border-radius: 10px; padding: 8px 12px; color: #fff; font-size: 13px; outline: none; }
  .tag-input-row input::placeholder { color: #52525b; }
  .btn-add-tag { background: #4f46e5; border: none; border-radius: 10px; padding: 8px 14px; color: #fff; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-save { width: 100%; background: #4f46e5; border: none; border-radius: 12px; padding: 14px; color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.15s; }
  .btn-save:disabled { background: #3f3f46; color: #71717a; cursor: not-allowed; }
  mark { background: #fbbf24; color: #18181b; border-radius: 3px; padding: 0 1px; }
</style>
</head>
<body class="auth-locked">
<div class="login-gate">
  <div class="login-card">
    <div class="login-icon">🇯🇵</div>
    <div class="login-title">나의 일본어 노트</div>
    <div class="login-sub">Google 계정으로 로그인해야 앱을 사용할 수 있습니다. 로그인 후 내 표현이 Firebase에 자동 저장됩니다.</div>
    <button class="login-btn" onclick="handleAuth()">Google로 시작하기</button>
  </div>
</div>
<div class="header">
  <div class="header-hero">
    <div class="header-top">
      <div class="header-left">
        <span class="header-flag">🇯🇵</span>
        <div>
          <div class="header-title">나의 일본어 노트</div>
          <div class="header-count" id="count">0개의 회화 표현</div>
        </div>
      </div>
      <button class="auth-btn" id="authButton" onclick="handleAuth()">로그아웃</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="일본어 또는 한국어로 검색" oninput="onSearch()" />
    <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
  </div>
  <div class="tags-row" id="tagsRow"></div>
</div>
<div class="cards" id="cards"></div>
<button class="fab" onclick="openModal(null)"><span style="font-size:20px;line-height:1">+</span> 표현 추가</button>
<div class="overlay" id="overlay" onclick="closeModalIfBg(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">새 회화 추가</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="field"><label>일본어 원문 *</label><input class="jp" id="f-japanese" placeholder="예: お疲れ様でした" oninput="checkValid()" /></div>
    <div class="field"><label>읽는 법 (히라가나)</label><input id="f-reading" placeholder="예: おつかれさまでした" style="font-family:'Noto Sans JP',sans-serif" /></div>
    <div class="field"><label>한국어 뜻 *</label><input id="f-korean" placeholder="예: 수고하셨습니다" oninput="checkValid()" /></div>
    <div class="field"><label>출처 (유튜브 채널, 사이트 등)</label><input id="f-source" placeholder="예: 유튜브 - 日本語の森" /></div>
    <div class="field"><label>메모</label><input id="f-note" placeholder="언제 쓰는지, 뉘앙스 등" /></div>
    <div class="tag-section">
      <label>태그</label>
      <div class="existing-tags" id="modalTags"></div>
      <div class="tag-input-row">
        <input id="tagInput" placeholder="새 태그 입력 후 + 버튼" onkeydown="if(event.key==='Enter')addTagFromInput()" />
        <button class="btn-add-tag" onclick="addTagFromInput()">+</button>
      </div>
    </div>
    <button class="btn-save" id="btnSave" onclick="handleSave()" disabled>저장하기</button>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAnalytics, isSupported as isAnalyticsSupported } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDyKiervhmEgcwDxCCtzl85AFjr_-aZn6U",
  authDomain: "japanese-note-1dc3e.firebaseapp.com",
  projectId: "japanese-note-1dc3e",
  storageBucket: "japanese-note-1dc3e.firebasestorage.app",
  messagingSenderId: "437184948701",
  appId: "1:437184948701:web:42b44bdf60adefa3772e34",
  measurementId: "G-DKT421YQHE"
};

const app = initializeApp(firebaseConfig);
isAnalyticsSupported().then((ok) => { if (ok) getAnalytics(app); }).catch(() => {});
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getFirestore(app);

const STORAGE_KEY="jp-study-phrases";
const TAG_COLORS=["#0ea5e9","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#14b8a6","#f97316"];
const ALL_TAG_COLOR="#4f46e5";
const SAMPLE=[{id:1,japanese:"いただきます",reading:"いただきます",korean:"잘 먹겠습니다 (식사 전 인사)",source:"일상 회화",tags:["식사","인사"],note:"식사 시작 전 반드시 쓰는 표현",createdAt:Date.now()-10000},{id:2,japanese:"お疲れ様でした",reading:"おつかれさまでした",korean:"수고하셨습니다",source:"유튜브 - 직장 드라마",tags:["직장","인사"],note:"퇴근할 때 동료에게",createdAt:Date.now()-8000},{id:3,japanese:"すみません、〜はどこですか？",reading:"すみません、〜はどこですか？",korean:"저기요, ~은 어디에 있나요?",source:"여행 일본어 사이트",tags:["여행","길 찾기"],note:"〜 자리에 장소명 넣기",createdAt:Date.now()-5000}];
let phrases=[],query="",activeTag=null,editingId=null,selectedTags=[],openCards=new Set(),currentUser=null,hasLocalData=false;
function tagColor(tag){let hash=0;for(let i=0;i<tag.length;i++)hash=tag.charCodeAt(i)+((hash<<5)-hash);return TAG_COLORS[Math.abs(hash)%TAG_COLORS.length];}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);hasLocalData=!!raw;phrases=raw?JSON.parse(raw):SAMPLE;}catch{phrases=SAMPLE;}render();}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(phrases));}
function userPhrasesRef(){return collection(db,"users",currentUser.uid,"phrases");}
function phraseRef(id){return doc(db,"users",currentUser.uid,"phrases",String(id));}
function cleanPhrase(p){return{id:p.id,japanese:p.japanese||"",reading:p.reading||"",korean:p.korean||"",source:p.source||"",note:p.note||"",tags:Array.isArray(p.tags)?p.tags:[],createdAt:p.createdAt||Date.now(),updatedAt:Date.now(),syncedAt:serverTimestamp()};}
function setSyncStatus(text){console.log(text);}
async function upsertCloudPhrase(p){if(!currentUser)return;try{setSyncStatus("Firebase에 저장 중...");await setDoc(phraseRef(p.id),cleanPhrase(p),{merge:true});setSyncStatus("Firebase 자동 저장됨");}catch(e){console.error(e);setSyncStatus("Firebase 저장 실패 - 로컬에는 저장됨");}}
async function deleteCloudPhrase(id){if(!currentUser)return;try{setSyncStatus("Firebase에서 삭제 중...");await deleteDoc(phraseRef(id));setSyncStatus("Firebase 자동 저장됨");}catch(e){console.error(e);setSyncStatus("Firebase 삭제 실패 - 로컬에는 반영됨");}}
async function uploadAllToCloud(){if(!currentUser)return;try{setSyncStatus("기존 로컬 데이터를 Firebase로 업로드 중...");await Promise.all(phrases.map((p)=>setDoc(phraseRef(p.id),cleanPhrase(p),{merge:true})));setSyncStatus("Firebase 자동 저장됨");}catch(e){console.error(e);setSyncStatus("Firebase 업로드 실패");}}
async function loadCloudPhrases(){if(!currentUser)return;try{setSyncStatus("Firebase에서 불러오는 중...");const snap=await getDocs(userPhrasesRef());if(snap.empty){if(hasLocalData&&phrases.length>0)await uploadAllToCloud();else setSyncStatus("Firebase 자동 저장 준비됨");return;}phrases=snap.docs.map((d)=>d.data()).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));save();openCards.clear();render();setSyncStatus("Firebase 자동 저장됨");}catch(e){console.error(e);setSyncStatus("Firebase 불러오기 실패 - 로컬 데이터 사용 중");}}
function updateAuthUi(){const btn=document.getElementById("authButton");if(currentUser){document.body.classList.remove("auth-locked");btn.textContent="로그아웃";}else{document.body.classList.add("auth-locked");setSyncStatus("Google 로그인하면 Firebase에 자동 저장됩니다");}}
async function handleAuth(){try{if(currentUser)await signOut(auth);else await signInWithRedirect(auth,provider);}catch(e){console.error(e);setSyncStatus("로그인 처리 실패");}}
function getAllTags(){const s=new Set();phrases.forEach(p=>p.tags.forEach(t=>s.add(t)));return[...s].sort();}
function highlight(text){if(!query||!text)return escHtml(text||"");const idx=text.toLowerCase().indexOf(query.toLowerCase());if(idx===-1)return escHtml(text);return escHtml(text.slice(0,idx))+`<mark>${escHtml(text.slice(idx,idx+query.length))}</mark>`+escHtml(text.slice(idx+query.length));}
function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function render(){document.getElementById("count").textContent=phrases.length+"개의 회화 표현";const allTags=getAllTags();const tagsRow=document.getElementById("tagsRow");if(allTags.length===0){tagsRow.innerHTML="";}else{let html=`<button class="pill" onclick="setTag(null)" style="border-color:${ALL_TAG_COLOR};background:${activeTag===null?ALL_TAG_COLOR:'transparent'};color:${activeTag===null?'#fff':ALL_TAG_COLOR}">전체</button>`;allTags.forEach(t=>{const c=tagColor(t);const active=activeTag===t;html+=`<button class="pill" onclick="setTag('${escHtml(t)}')" style="border-color:${c};background:${active?c:'transparent'};color:${active?'#fff':c}">${escHtml(t)}</button>`;});tagsRow.innerHTML=html;}
const filtered=phrases.filter(p=>{const q=query.toLowerCase();const matchQ=!q||(p.japanese||"").toLowerCase().includes(q)||(p.reading||"").toLowerCase().includes(q)||(p.korean||"").toLowerCase().includes(q)||(p.note||"").toLowerCase().includes(q);const matchTag=!activeTag||p.tags.includes(activeTag);return matchQ&&matchTag;}).sort((a,b)=>b.createdAt-a.createdAt);const cards=document.getElementById("cards");if(filtered.length===0){cards.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">${query||activeTag?"검색 결과가 없어요":"아직 표현이 없어요"}</div><div class="empty-sub">아래 + 버튼으로 추가해보세요</div></div>`;return;}
cards.innerHTML=filtered.map(p=>{const isOpen=openCards.has(p.id);const tagsHtml=p.tags.map(t=>{const c=tagColor(t);return`<span class="pill" style="border-color:${c};background:${c};color:#fff;cursor:default">${escHtml(t)}</span>`;}).join("");return`<div class="card" id="card-${p.id}" onclick="toggleCard(${p.id})"><div class="card-top"><div style="flex:1"><div class="card-jp">${highlight(p.japanese)}</div>${p.reading&&p.reading!==p.japanese?`<div class="card-reading">${highlight(p.reading)}</div>`:""}<div class="card-kr">${highlight(p.korean)}</div></div><span class="card-arrow" id="arrow-${p.id}">${isOpen?"▲":"▼"}</span></div><div class="card-detail" id="detail-${p.id}" style="display:${isOpen?'block':'none'}">${p.source?`<div class="card-source">📌 <span>${escHtml(p.source)}</span></div>`:""} ${p.note?`<div class="card-note">💬 ${escHtml(p.note)}</div>`:""}<div class="card-tags">${tagsHtml}</div><div class="card-actions"><button class="card-btn btn-edit" onclick="event.stopPropagation();openModal(${p.id})">✏️ 수정</button><button class="card-btn btn-del" onclick="event.stopPropagation();deletePhrase(${p.id})">🗑️ 삭제</button></div></div></div>`;}).join("");}
function toggleCard(id){if(openCards.has(id))openCards.delete(id);else openCards.add(id);const detail=document.getElementById("detail-"+id);const arrow=document.getElementById("arrow-"+id);if(detail){detail.style.display=openCards.has(id)?"block":"none";}if(arrow){arrow.textContent=openCards.has(id)?"▲":"▼";}}
function setTag(t){activeTag=t;render();}
function onSearch(){query=document.getElementById("searchInput").value;document.getElementById("searchClear").style.display=query?"block":"none";render();}
function clearSearch(){document.getElementById("searchInput").value="";query="";document.getElementById("searchClear").style.display="none";render();}
function openModal(id){editingId=id;selectedTags=[];const overlay=document.getElementById("overlay");overlay.style.display="flex";document.getElementById("modalTitle").textContent=id?"회화 수정":"새 회화 추가";if(id){const p=phrases.find(x=>x.id===id);document.getElementById("f-japanese").value=p.japanese||"";document.getElementById("f-reading").value=p.reading||"";document.getElementById("f-korean").value=p.korean||"";document.getElementById("f-source").value=p.source||"";document.getElementById("f-note").value=p.note||"";selectedTags=[...p.tags];}else{["f-japanese","f-reading","f-korean","f-source","f-note"].forEach(id=>document.getElementById(id).value="");}document.getElementById("tagInput").value="";renderModalTags();checkValid();}
function closeModal(){document.getElementById("overlay").style.display="none";}
function closeModalIfBg(e){if(e.target===document.getElementById("overlay"))closeModal();}
function renderModalTags(){const allTags=getAllTags();const merged=[...new Set([...allTags,...selectedTags])];const container=document.getElementById("modalTags");container.innerHTML=merged.map(t=>{const c=tagColor(t);const active=selectedTags.includes(t);return`<button class="pill" onclick="toggleModalTag('${escHtml(t)}')" style="border-color:${c};background:${active?c:'transparent'};color:${active?'#fff':c}">${escHtml(t)}</button>`;}).join("");}
function toggleModalTag(t){if(selectedTags.includes(t))selectedTags=selectedTags.filter(x=>x!==t);else selectedTags.push(t);renderModalTags();}
function addTagFromInput(){const val=document.getElementById("tagInput").value.trim();if(val&&!selectedTags.includes(val))selectedTags.push(val);document.getElementById("tagInput").value="";renderModalTags();}
function checkValid(){const jp=document.getElementById("f-japanese").value.trim();const kr=document.getElementById("f-korean").value.trim();document.getElementById("btnSave").disabled=!(jp&&kr);}
function handleSave(){const jp=document.getElementById("f-japanese").value.trim();const kr=document.getElementById("f-korean").value.trim();if(!jp||!kr)return;const form={japanese:jp,reading:document.getElementById("f-reading").value.trim(),korean:kr,source:document.getElementById("f-source").value.trim(),note:document.getElementById("f-note").value.trim(),tags:[...selectedTags]};let savedPhrase;if(editingId){phrases=phrases.map(p=>{if(p.id!==editingId)return p;savedPhrase={...p,...form,updatedAt:Date.now()};return savedPhrase;});}else{savedPhrase={...form,id:Date.now(),createdAt:Date.now(),updatedAt:Date.now()};phrases.unshift(savedPhrase);}save();closeModal();render();upsertCloudPhrase(savedPhrase);}
function deletePhrase(id){if(confirm("삭제할까요?")){phrases=phrases.filter(p=>p.id!==id);openCards.delete(id);save();render();deleteCloudPhrase(id);}}
function handleExport(){const data=JSON.stringify(phrases,null,2);const blob=new Blob([data],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="일본어노트_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);}
load();
getRedirectResult(auth).catch((e)=>{console.error(e);setSyncStatus("로그인 처리 실패");});
onAuthStateChanged(auth,(user)=>{currentUser=user;updateAuthUi();if(user)loadCloudPhrases();});
Object.assign(window,{handleAuth,handleExport,onSearch,clearSearch,setTag,toggleCard,openModal,closeModal,closeModalIfBg,toggleModalTag,addTagFromInput,checkValid,handleSave,deletePhrase});
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{});});}
</script>
